<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>De Williams Place Booking</title>
  <link rel="stylesheet" href="/hms/assets/css/style.css">
</head>

<body>
  <section class="hero">
    <div class="hero-inner">
      <div class="brand">
        DE-WILLIAMS PLACE
        <small>Luxury Hotel · Spa · Lounge · Restaurant</small>
      </div>

      <h1>Book your luxury stay with confidence.</h1>

      <p>
        Search available rooms, apply promo codes, pay securely or reserve for 6 hours,
        and receive your reservation slip with a check-in code.
      </p>

      <div class="booking-panel">
        <div class="steps">
          <div class="step active"></div>
          <div class="step"></div>
          <div class="step"></div>
        </div>

        <!-- Search Step -->
        <div id="searchStep">
          <div class="form two">
            <div>
              <label>Check in</label>
              <input type="date" id="checkin">
            </div>

            <div>
              <label>Check out</label>
              <input type="date" id="checkout">
            </div>

            <div>
              <label>Adults</label>
              <input type="number" id="adults" value="1" min="1">
            </div>

            <div>
              <label>Children</label>
              <input type="number" id="children" value="0" min="0">
            </div>

            <div>
              <label>Promo code</label>
              <input id="promo" placeholder="DEWILLIAMS10">
            </div>

            <div style="align-self:end">
              <button class="btn gold" onclick="searchRooms()">Search rooms</button>
            </div>
          </div>
        </div>

        <!-- Rooms Step -->
        <div id="roomsStep" class="hidden">
          <button class="btn ghost" onclick="backToSearch()">Back</button>

          <h2>Available Rooms</h2>

          <p id="discountNotice" class="muted"></p>

          <div id="rooms" class="room-grid"></div>
        </div>

        <!-- Guest Step -->
        <div id="guestStep" class="hidden">
          <button class="btn ghost" onclick="showStep('roomsStep')">Back</button>

          <h2>Guest Details</h2>

          <div class="form two">
            <input id="firstName" placeholder="First name">
            <input id="lastName" placeholder="Last name">
            <input id="email" placeholder="Email address">
            <input id="phone" placeholder="Phone number">
            <input id="address" placeholder="Address">

            <select id="idType">
              <option>National ID</option>
              <option>Passport</option>
              <option>Driver License</option>
              <option>Voter Card</option>
            </select>

            <input id="idNumber" placeholder="ID Number">

            <textarea
              id="specialRequest"
              placeholder="Special request, allergies or others"
            ></textarea>
          </div>

          <br>

          <div id="summary" class="summary"></div>

          <br>

          <button class="btn ghost" onclick="reserveNow()">Book now (Reserve)</button>
          <!--<button class="btn gold" onclick="payNow()">Book now (Pay)</button>-->
        </div>
      </div>
    </div>
  </section>

  <script src="/hms/assets/js/app.js"></script>

  <script>
    let selectedRoom = null;
    let availableRooms = [];
    let currentDiscount = 0;

    function showStep(id) {
      ['searchStep', 'roomsStep', 'guestStep'].forEach(step => {
        document.getElementById(step).classList.add('hidden');
      });

      document.getElementById(id).classList.remove('hidden');
    }

    function backToSearch() {
      showStep('searchStep');
    }

    function nights() {
      return Math.max(
        1,
        (new Date(checkout.value) - new Date(checkin.value)) / 86400000
      );
    }

    async function searchRooms() {
      if (!checkin.value || !checkout.value) {
        return notify(
          'Please select check-in and check-out dates.',
          'Date Required',
          'error'
        );
      }

      const q = `rooms.php?checkin=${checkin.value}&checkout=${checkout.value}&adults=${adults.value}&children=${children.value}&promoCode=${encodeURIComponent(promo.value)}`;

      const d = await api(q);

      availableRooms = d.rooms;
      currentDiscount = d.discountPercent || 0;

      renderRooms();
      showStep('roomsStep');
    }

    function renderRooms() {
      discountNotice.textContent = currentDiscount
        ? `${currentDiscount}% discount has been applied to available rooms.`
        : '';

      rooms.innerHTML = availableRooms.map(room => {
        const total = room.discountedPrice * nights();

        return `
          <div class="room-card">
            <div class="room-img">${room.type[0]}</div>

            <div class="room-body">
              <h2>${room.type}</h2>

              <p>${room.features.join(' · ')}</p>

              <p>Max guests: <b>${room.maxGuests}</b></p>

              <div class="price">
                ${
                  room.discountPercent
                    ? `<span class="old">${money(room.price)}</span>${money(room.discountedPrice)}`
                    : money(room.price)
                } / night
              </div>

              <p class="muted">Estimated total: ${money(total)}</p>

              ${
                room.discountPercent
                  ? `<p><span class="discount-badge">${room.discountPercent}% discount applied</span></p>`
                  : ''
              }

              <br>

              <button class="btn gold" onclick='selectRoom(${JSON.stringify(room)})'>
                Select room
              </button>
            </div>
          </div>
        `;
      }).join('') || '<p>No rooms available for this search.</p>';
    }

    function selectRoom(room) {
      selectedRoom = room;

      const n = nights();
      const subtotal = room.price * n;
      const discountAmount = subtotal * (currentDiscount / 100);
      const total = subtotal - discountAmount;

      summary.innerHTML = `
        <h3>Room Summary</h3>
        <p>${room.type} · Room ${room.number}</p>
        <p>${n} night(s) × ${money(room.price)}</p>
        <p>
          Discount:
          ${
            currentDiscount
              ? `${currentDiscount}% (${money(discountAmount)} saved)`
              : 'No discount'
          }
        </p>
        <h2>Total: ${money(total)}</h2>
        <p class="muted">Reserve without payment keeps this room for only 6 hours.</p>
      `;

      showStep('guestStep');
    }

    function guestPayload() {
      return {
        firstName: firstName.value,
        lastName: lastName.value,
        email: email.value,
        phone: phone.value,
        address: address.value,
        idType: idType.value,
        idNumber: idNumber.value,
        specialRequest: specialRequest.value
      };
    }

    function basePayload(actionType) {
      return {
        checkin: checkin.value,
        checkout: checkout.value,
        roomId: selectedRoom.id,
        guest: guestPayload(),
        promoCode: promo.value,
        paymentMethod: actionType === 'reserve_unpaid' ? '' : 'online',
        source: 'online',
        actionType,
        occupancy: `${adults.value} adult(s), ${children.value} child(ren)`,
        reference: 'PAYSTACK_DEMO_' + Date.now()
      };
    }

    async function reserveNow() {
      if (!selectedRoom) {
        return notify('Please select a room first.', 'Room Required', 'error');
      }

      try {
        const booking = await api('bookings.php', {
          method: 'POST',
          body: JSON.stringify(basePayload('reserve_unpaid'))
        });

        showSlip(
          booking,
          'Reservation Held',
          'Your reservation is pending. It will expire after 6 hours if payment is not completed. Please contact the hotel official line or walk in to pay.'
        );
      } catch (error) {
        notify(error.message, 'Reservation Failed', 'error');
      }
    }

    async function payNow() {
      if (!selectedRoom) {
        return notify('Please select a room first.', 'Room Required', 'error');
      }

      // Paystack initialization should happen here in production,
      // then verify payment on backend before final confirmation.
      try {
        const booking = await api('bookings.php', {
          method: 'POST',
          body: JSON.stringify(basePayload('reserve'))
        });

        showSlip(
          booking,
          'Booking Successful',
          'Payment confirmed. Your reservation is secured.'
        );
      } catch (error) {
        notify(error.message, 'Booking Failed', 'error');
      }
    }

    function showSlip(booking, title, message) {
      document.body.insertAdjacentHTML('beforeend', `
        <div class="modal">
          <div class="modal-content">
            <h2>${title}</h2>

            <p>${message}</p>

            <div class="summary">
              <p><b>Booking ID / Check-in Code:</b> ${booking.bookingId}</p>
              <p><b>Guest:</b> ${booking.guest.firstName} ${booking.guest.lastName}</p>
              <p><b>Room:</b> ${booking.roomType} ${booking.roomNumber}</p>
              <p><b>Status:</b> ${booking.status.replaceAll('_', ' ')}</p>
              <p><b>Total:</b> ${money(booking.total)}</p>

              ${
                booking.expiresAt
                  ? `<p><b>Expires:</b> ${new Date(booking.expiresAt).toLocaleString()}</p>`
                  : ''
              }
            </div>

            <br>

            <button class="btn gold" onclick="print()">Print slip</button>
            <button class="btn" onclick="location.reload()">Done</button>
          </div>
        </div>
      `);
    }
  </script>
</body>
</html>
